<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房产估值计算器 | House Value</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
  <h1>房产估值计算器</h1>
  <p>基于专家规则引擎 · 杭州城市知识库 · 三把尺子交叉验证</p>
</div>

<div class="container">

  <!-- 输入表单 -->
  <form id="valuationForm">
    <div class="card">
      <div class="card-title"><span class="icon">📍</span>区域信息</div>
      <div class="form-group">
        <label class="form-label">所在区域</label>
        <select class="form-select" name="district" id="district" required>
          <option value="">请选择区域</option>
        </select>
        <div id="districtInfo" style="display:none;"></div>
      </div>
      <div class="form-group">
        <label class="form-label">板块/商圈</label>
        <select class="form-select" name="businessDistrict" id="businessDistrict">
          <option value="">请选择板块/商圈</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">小区名称</label>
        <input class="form-input" type="text" name="communityName" placeholder="如：万科西庐、绿城桂语江南">
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🏠</span>房屋信息</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">面积（㎡）</label>
          <input class="form-input" type="number" name="area" placeholder="89" min="1" required>
        </div>
        <div class="form-group">
          <label class="form-label">朝向</label>
          <select class="form-select" name="orientation">
            <option value="南北通透">南北通透</option>
            <option value="朝南">朝南</option>
            <option value="东南">东南</option>
            <option value="南北">南北</option>
            <option value="东西">东西</option>
            <option value="朝北">朝北</option>
            <option value="西北">西北</option>
            <option value="东北">东北</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">所在楼层</label>
          <input class="form-input" type="number" name="floor" placeholder="6" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">总楼层</label>
          <input class="form-input" type="number" name="totalFloors" placeholder="18" min="1">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">装修</label>
          <select class="form-select" name="decoration">
            <option value="简装修">简装修</option>
            <option value="精装修">精装修</option>
            <option value="豪华装修">豪华装修</option>
            <option value="毛坯">毛坯</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">房龄（年）</label>
          <input class="form-input" type="number" name="buildingAge" placeholder="5" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">电梯</label>
          <select class="form-select" name="hasElevator">
            <option value="on">有电梯</option>
            <option value="">无电梯</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">楼栋位置</label>
          <select class="form-select" name="buildingPosition">
            <option value="楼王">楼王位置</option>
            <option value="好位置">好位置</option>
            <option value="一般位置" selected>一般位置</option>
            <option value="临小区路">临小区路</option>
            <option value="临市政路">临市政路</option>
            <option value="临底商">临底商</option>
            <option value="临垃圾站">临垃圾站/变电站</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">💰</span>价格数据（从链家/贝壳/安居客查询后填写）</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">同小区均价（元/㎡）</label>
          <input class="form-input" type="number" name="marketPrice" placeholder="45000" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">同户型月租金（元/月）</label>
          <input class="form-input" type="number" name="monthlyRent" placeholder="5000" min="0">
        </div>
      </div>
      <div style="font-size:12px;color:#94a3b8;margin-top:-8px;">
        提示：至少填写一个均价或租金用于估值。两个都填效果更准确。
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🚇</span>交通配套</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">最近地铁距离（米）</label>
          <input class="form-input" type="number" name="metroDistance" placeholder="500" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">地铁线路数</label>
          <input class="form-input" type="number" name="metroLines" placeholder="1" min="0" value="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">周边公交线路数</label>
        <input class="form-input" type="number" name="busRoutes" placeholder="8" min="0" value="0">
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🎓</span>教育配套</div>
      <div class="form-group">
        <label class="form-label">对口学校</label>
        <input class="form-input" type="text" name="schoolName" id="schoolName" list="schoolList" placeholder="如：学军小学、文澜中学">
        <datalist id="schoolList"></datalist>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🛒</span>商业配套</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">周边大型商场数</label>
          <input class="form-input" type="number" name="mallCount" placeholder="1" min="0" value="0">
        </div>
        <div class="form-group">
          <label class="form-label">周边餐饮数</label>
          <input class="form-input" type="number" name="restaurantCount" placeholder="15" min="0" value="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">有无菜市场</label>
        <select class="form-select" name="hasMarket">
          <option value="on">有</option>
          <option value="">无</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🏥</span>医疗配套</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">三甲医院</label>
          <select class="form-select" name="hasTier3Hospital">
            <option value="on">有（3km内）</option>
            <option value="">无</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">三甲医院距离（米）</label>
          <input class="form-input" type="number" name="hospitalDistance" placeholder="2000" min="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">社区医院/诊所</label>
        <select class="form-select" name="hasCommunityHospital">
          <option value="on">有（1km内）</option>
          <option value="">无</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🌳</span>自然环境</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">公园/绿地</label>
          <select class="form-select" name="hasPark">
            <option value="on">有</option>
            <option value="">无</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">公园距离（米）</label>
          <input class="form-input" type="number" name="parkDistance" placeholder="500" min="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">河/湖景观</label>
        <select class="form-select" name="hasWater">
          <option value="">无</option>
          <option value="on">有</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">⚠️</span>硬伤因素（勾选存在的）</div>
      <div id="defectsAutoDetect" style="margin-bottom:16px;padding:12px;background:#fef3c7;border-radius:8px;display:none;">
        <div style="font-weight:600;color:#92400e;margin-bottom:8px;">📍 根据您选择的区域，检测到以下潜在硬伤：</div>
        <div id="defectsAutoList"></div>
        <div style="margin-top:8px;font-size:12px;color:#b45309;">注：以上为区域级别的硬伤提示，具体房源可能不受影响，请根据实际情况勾选</div>
      </div>
      <div class="form-checkbox-group">
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="highway_noise"> 高架/高速噪音</label>
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="main_road_noise"> 主干道噪音</label>
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="cemetery"> 公墓/殡仪馆</label>
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="substation"> 变电站/高压线</label>
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="garbage_station"> 垃圾处理站</label>
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="sewage_plant"> 污水处理厂</label>
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="airport_noise"> 机场航线噪音</label>
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="low_ground"> 地势低洼易涝</label>
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="gas_station"> 加油站/加气站</label>
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="poor_lighting"> 采光严重不足</label>
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="factory_pollution"> 工厂污染</label>
        <label class="form-checkbox-item"><input type="checkbox" name="defects" value="red_light"> 治安差/红灯区</label>
      </div>
    </div>

    <button type="submit" class="btn-primary">开始估值分析</button>
  </form>

  <!-- 结果区域 -->
  <div id="resultSection" class="result-section" style="margin-top:24px;">
    <div id="resultContent"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
